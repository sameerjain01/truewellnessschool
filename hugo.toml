  og_image    = "/images/og-image.png"
  instagram   = "https://www.instagram.com/truewellnessschool"
  facebook    = "https://www.facebook.com/truewellnessschool"
  youtube     = "https://www.youtube.com/@truewellnessschool"
  linkedin    = "https://www.linkedin.com/company/truewellnessschool"
