<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>True Wellness School — Something Beautiful is Coming</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, sans-serif;
      background: #FFFDF5;
      color: #1C1A0F;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245,197,24,.18) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: .7; }
      50%       { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) { .glow { animation: none; } }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 560px;
    }

    .wordmark {
      font-family: "Cormorant Garamond", serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #C9A000;
      margin-bottom: 3.5rem;
    }

    .sun {
      width: 56px;
      height: 56px;
      background: #F5C518;
      border-radius: 50%;
      margin: 0 auto 2.5rem;
      box-shadow: 0 0 0 12px rgba(245,197,24,.12), 0 0 0 28px rgba(245,197,24,.06);
    }

    h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.75rem, 6vw, 4.5rem);
      font-weight: 600;
      line-height: 1.08;
      letter-spacing: -0.01em;
      color: #1C1A0F;
      margin-bottom: 1.5rem;
    }

    h1 em {
      font-style: italic;
      color: #C9A000;
    }

    .divider {
      width: 2.5rem;
      height: 2px;
      background: #F5C518;
      margin: 0 auto 1.5rem;
    }

    p {
      font-size: 1rem;
      line-height: 1.8;
      color: #6b6645;
      font-weight: 300;
      max-width: 380px;
      margin: 0 auto 3rem;
    }

    .instagram {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: #1C1A0F;
      text-decoration: none;
      border-bottom: 1px solid rgba(28,26,15,.2);
      padding-bottom: 2px;
      transition: border-color .2s, color .2s;
    }
    .instagram:hover { color: #C9A000; border-color: #C9A000; }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.7rem;
      color: rgba(28,26,15,.3);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="container">
    <p class="wordmark">True Wellness School</p>
    <div class="sun"></div>
    <h1>Something <em>beautiful</em><br />is on its way.</h1>
    <div class="divider"></div>
    <p>A new chapter in holistic wellness — for mind, body, emotions, and spirit. We are putting the finishing touches on something that will change how you experience wellbeing.</p>
    <a class="instagram" href="{{ .Site.Params.instagram }}" target="_blank">
      <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
      Follow us @truewellnessschool
    </a>
  </div>

  <footer>&copy; {{ now.Year }} True Wellness School</footer>
</body>
</html>
