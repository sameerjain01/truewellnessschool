<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale | default "en" }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  {{ partial "nav.html" . }}
  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  {{ partial "site-utilities.html" . }}
  {{ partial "a11y-bar.html" . }}

  <script>
    (function() {
      var nav = document.getElementById('site-nav');
      if (nav) window.addEventListener('scroll', function() {
        nav.classList.toggle('scrolled', window.scrollY > 20);
      }, { passive: true });

      var btn  = document.getElementById('nav-hamburger');
      var menu = document.getElementById('nav-mobile');
      if (!btn || !menu) return;

      function openMenu() {
        menu.classList.add('open');
        btn.setAttribute('aria-expanded', 'true');
        document.body.style.overflow = 'hidden';
        var first = menu.querySelector('a');
        if (first) first.focus();
      }
      function closeMenu() {
        menu.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';
        btn.focus();
      }

      btn.addEventListener('click', function() {
        menu.classList.contains('open') ? closeMenu() : openMenu();
      });
      document.addEventListener('keydown', function(e) {
        if (!menu.classList.contains('open')) return;
        if (e.key === 'Escape') { closeMenu(); return; }
        // Focus trap — cycle Tab within mobile menu
        if (e.key === 'Tab') {
          var focusable = Array.from(menu.querySelectorAll('a, button, [tabindex]:not([tabindex="-1"])'));
          var first = focusable[0], last = focusable[focusable.length - 1];
          if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
          else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
        }
      });
      menu.querySelectorAll('a').forEach(function(a) { a.addEventListener('click', closeMenu); });
    })();
  </script>

  {{ block "scripts" . }}{{ end }}
</body>
</html>
