{{ define "main" }}
<div class="pt-32 pb-20 px-6 max-w-4xl mx-auto">
  <h1 class="font-display text-5xl text-charcoal mb-10">{{ .Title }}</h1>
  <ul class="space-y-4">
    {{ range .Pages }}
    <li><a href="{{ .Permalink }}" class="text-lg font-semibold hover:underline" style="color:#C9A000">{{ .Title }}</a></li>
    {{ end }}
  </ul>
</div>
{{ end }}
