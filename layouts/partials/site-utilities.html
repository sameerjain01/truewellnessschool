<!-- Go to Top button -->
<button class="go-top" id="go-top" aria-label="Back to top" title="Back to top" hidden>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <polyline points="18 15 12 9 6 15"></polyline>
  </svg>
</button>

<!-- Privacy / data notice -->
<div class="privacy-notice" id="privacy-notice" role="region" aria-label="Privacy notice" hidden>
  <p class="privacy-notice__text">
    🌿 We're True Wellness — we believe in a simpler life. We don't track you, sell your data, or use advertising cookies. Ever.
    <a href="{{ "/privacy/" | relURL }}" class="privacy-notice__link">Our full privacy promise</a>
  </p>
  <button class="privacy-notice__close" id="privacy-dismiss" aria-label="Dismiss privacy notice">Got it</button>
</div>

<script>
(function(){
  // ── Go to Top ──────────────────────────────────────────────
  var topBtn = document.getElementById('go-top');
  if (topBtn) {
    window.addEventListener('scroll', function() {
      topBtn.hidden = window.scrollY < 400;
    }, { passive: true });
    topBtn.addEventListener('click', function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  // ── Privacy notice ─────────────────────────────────────────
  var notice  = document.getElementById('privacy-notice');
  var dismiss = document.getElementById('privacy-dismiss');
  if (notice && !localStorage.getItem('tw-privacy-ok')) {
    // Show after a short delay so it doesn't flash immediately on load
    setTimeout(function() { notice.hidden = false; }, 1200);
  }
  if (dismiss) {
    dismiss.addEventListener('click', function() {
      notice.hidden = true;
      localStorage.setItem('tw-privacy-ok', '1');
    });
  }
})();
</script>
