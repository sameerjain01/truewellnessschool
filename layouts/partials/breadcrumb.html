{{ if not .IsHome }}
<nav class="breadcrumb" aria-label="Breadcrumb">
  <ol>
    <li><a href="{{ "/" | relURL }}">Home</a></li>
    {{ if .Parent }}
    <li><span class="breadcrumb-sep" aria-hidden="true">/</span><a href="{{ .Parent.RelPermalink }}">{{ .Parent.Title }}</a></li>
    {{ end }}
    <li><span class="breadcrumb-sep" aria-hidden="true">/</span><span aria-current="page">{{ .Title }}</span></li>
  </ol>
</nav>
{{ end }}
