{{ if not .IsHome }}
<nav class="breadcrumb" aria-label="Breadcrumb">
  <a href="{{ "/" | relURL }}">Home</a>
  {{ if .Parent }}
    <span class="breadcrumb-sep" aria-hidden="true">/</span>
    <a href="{{ .Parent.RelPermalink }}">{{ .Parent.Title }}</a>
  {{ end }}
  <span class="breadcrumb-sep" aria-hidden="true">/</span>
  <span aria-current="page">{{ .Title }}</span>
</nav>
{{ end }}
